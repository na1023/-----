<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="株式管理">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>株式管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">

  <!-- ===== Sidebar (PC) ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
        <rect width="32" height="32" rx="8" fill="#2563eb"/>
        <polyline points="6,22 13,14 18,18 26,9" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <polyline points="22,9 26,9 26,13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="brand-name">株式管理</span>
    </div>

    <nav class="sidebar-nav">
      <button class="snav-item active" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        ダッシュボード
      </button>
      <button class="snav-item" data-page="holdings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        保有銘柄
      </button>
      <button class="snav-item" data-page="dividends">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        配当金
      </button>
      <button class="snav-item" data-page="pnl">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        損益分析
      </button>
      <button class="snav-item" data-page="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        設定
      </button>
    </nav>

    <div class="sidebar-bottom">
      <button class="btn-add-holding" id="sidebarAddBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        銘柄を追加
      </button>
    </div>
  </aside>

  <!-- ===== Main ===== -->
  <div class="main-wrap">
    <!-- Mobile / PC top bar -->
    <header class="topbar">
      <h1 class="topbar-title" id="topbar-title">ダッシュボード</h1>
      <div class="topbar-right">
        <span class="sync-badge" id="sync-badge"></span>
        <button class="icon-btn" id="btn-refresh" title="株価を更新">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        </button>
        <button class="btn-primary-sm" id="topbarAddBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          追加
        </button>
      </div>
    </header>

    <main class="page-area" id="page-area"></main>
  </div>

  <!-- ===== Bottom Nav (Mobile) ===== -->
  <nav class="bottom-nav">
    <button class="bnav-item active" data-page="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>ホーム</span>
    </button>
    <button class="bnav-item" data-page="holdings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      <span>保有</span>
    </button>
    <button class="bnav-center" id="mobileAddBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="24" height="24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="bnav-item" data-page="dividends">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      <span>配当</span>
    </button>
    <button class="bnav-item" data-page="pnl">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>損益</span>
    </button>
  </nav>

</div><!-- #app -->

<!-- ===== Holding Modal ===== -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="holding-modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">銘柄を追加</h2>
      <button class="modal-close" id="modal-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group" style="flex:0 0 130px">
          <label class="form-label">銘柄コード</label>
          <input class="form-input" id="m-code" type="text" inputmode="numeric" placeholder="4755" maxlength="6">
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label">銘柄名 <span class="req">*</span></label>
          <input class="form-input" id="m-name" type="text" placeholder="例: 楽天グループ">
          <div class="autocomplete-list" id="ac-list"></div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label class="form-label">保有株数 <span class="req">*</span></label>
          <input class="form-input" id="m-shares" type="number" inputmode="numeric" min="1" step="1" placeholder="100">
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label">平均取得単価（円）<span class="req">*</span></label>
          <input class="form-input" id="m-avg-cost" type="number" inputmode="decimal" min="0" step="0.1" placeholder="769">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">口座区分</label>
        <div class="tab-group">
          <button type="button" class="tab-btn active" data-val="特定">特定</button>
          <button type="button" class="tab-btn" data-val="NISA">NISA</button>
          <button type="button" class="tab-btn" data-val="一般">一般</button>
        </div>
        <input type="hidden" id="m-account" value="特定">
      </div>
      <div class="form-group">
        <label class="form-label">メモ（任意）</label>
        <input class="form-input" id="m-memo" type="text" placeholder="購入理由など">
      </div>
      <input type="hidden" id="m-id">
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="modal-cancel">キャンセル</button>
      <button class="btn-primary-lg" id="modal-save">保存する</button>
    </div>
  </div>
</div>

<!-- ===== Toast ===== -->
<div id="toast-wrap"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/api.js"></script>
<script src="js/portfolio.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/sync.js"></script>
<script src="js/app.js"></script>
</body>
</html>
