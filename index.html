<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>株式取引管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<div id="app">

  <!-- Mobile overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </svg>
      <span>株式取引管理</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        ダッシュボード
      </a>
      <a class="nav-item" data-page="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        取引履歴
      </a>
      <a class="nav-item" data-page="charts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        グラフ分析
      </a>
      <a class="nav-item" data-page="import">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        CSV取込
      </a>
      <a class="nav-item" data-page="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        設定
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-new-entry" id="sidebarNewBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新規取引を登録
      </button>
    </div>
  </aside>

  <!-- ===== Main ===== -->
  <div class="main-wrapper">
    <header class="topbar">
      <button class="topbar-menu-btn" id="menuBtn" aria-label="サイドバーを開く">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="topbar-title" id="pageTitle">ダッシュボード</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="topbarNewBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新規登録
        </button>
      </div>
    </header>

    <main class="page-content" id="pageContent"></main>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav">
    <button class="bnav-item active" data-page="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>ホーム</span>
    </button>
    <button class="bnav-item" data-page="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      <span>履歴</span>
    </button>
    <button class="bnav-item bnav-center" id="mobileNewBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="bnav-item" data-page="charts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>グラフ</span>
    </button>
    <button class="bnav-item" data-page="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span>設定</span>
    </button>
  </nav>

</div><!-- #app -->

<!-- ===== Trade Entry Modal ===== -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">新規取引登録</h2>
      <button class="modal-close" id="modalClose" aria-label="閉じる">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="tradeForm" novalidate autocomplete="off">

        <div class="form-row">
          <div class="form-group" style="flex:0 0 120px">
            <label class="form-label" for="f-code">銘柄コード</label>
            <input class="form-input" id="f-code" type="text" placeholder="7203">
          </div>
          <div class="form-group" style="flex:1">
            <label class="form-label" for="f-name">銘柄名 <span class="req">*</span></label>
            <input class="form-input" id="f-name" type="text" placeholder="例: トヨタ自動車">
            <p class="form-error" id="err-name"></p>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group" style="flex:1">
            <label class="form-label" for="f-date">日付 <span class="req">*</span></label>
            <input class="form-input" id="f-date" type="date">
            <p class="form-error" id="err-date"></p>
          </div>
          <div class="form-group" style="flex:1">
            <label class="form-label" for="f-account">取引区分</label>
            <select class="form-select" id="f-account">
              <option value="特定">特定口座</option>
              <option value="一般">一般口座</option>
              <option value="NISA">NISA</option>
              <option value="新NISA成長">新NISA（成長投資枠）</option>
              <option value="新NISA積立">新NISA（積立投資枠）</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">売買区分</label>
          <div class="side-toggle">
            <button type="button" class="side-btn active" data-v="buy">買付</button>
            <button type="button" class="side-btn" data-v="sell">売却</button>
          </div>
          <input type="hidden" id="f-side" value="buy">
        </div>

        <div class="form-row">
          <div class="form-group" style="flex:1">
            <label class="form-label" for="f-shares">株数 <span class="req">*</span></label>
            <input class="form-input" id="f-shares" type="number" min="1" step="1" placeholder="100">
            <p class="form-error" id="err-shares"></p>
          </div>
          <div class="form-group" style="flex:1">
            <label class="form-label" for="f-price">単価（円）</label>
            <input class="form-input" id="f-price" type="number" min="0" placeholder="2,850">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="f-amount">受渡金額（円） <span class="req">*</span></label>
          <input class="form-input" id="f-amount" type="number" min="0" placeholder="285,000">
          <p class="form-error" id="err-amount"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="f-note">備考</label>
          <input class="form-input" id="f-note" type="text" placeholder="メモ（任意）">
        </div>

      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modalCancelBtn">キャンセル</button>
      <button class="btn btn-primary" id="modalSubmitBtn">登録する</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/adapters.js"></script>
<script src="js/app.js"></script>
</body>
</html>
